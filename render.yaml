services:
  - type: web
    name: convoconnect-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # Set this manually in the Render Dashboard with your Neon connection string
      - key: FRONTEND_ORIGIN
        value: "https://your-vercel-app-url.vercel.app" # UPDATE THIS after Vercel deployment
      - key: GEMINI_API_KEY
        sync: false # Set this manually in the Render Dashboard


